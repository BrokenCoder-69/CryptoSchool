<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Crypto School{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* ── Nav ────────────────────────────────────────── */
        .navbar {
            background: #1a1a2e;
            border-bottom: 1px solid #2a2a4a;
            padding: 0.75rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .navbar .brand {
            color: #7b8cde;
            font-weight: 700;
            font-size: 1.1rem;
            text-decoration: none;
        }
        .navbar .nav-links a {
            color: #aaa;
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .navbar .nav-links a:hover { color: #7b8cde; }
        .navbar .nav-links .btn-logout {
            background: #3a1a1a;
            color: #f08080;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            border: 1px solid #5a2a2a;
        }

        /* ── Page wrapper ───────────────────────────────── */
        .page-wrapper {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* ── Card ───────────────────────────────────────── */
        .card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 480px;
            margin: 5vh auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        /* ── Dashboard card ─────────────────────────────── */
        .dash-card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .dash-card h2 {
            color: #7b8cde;
            margin-bottom: 1rem;
            font-size: 1.1rem;
            border-bottom: 1px solid #2a2a4a;
            padding-bottom: 0.5rem;
        }

        /* ── Stat boxes ─────────────────────────────────── */
        .stats-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .stat-box {
            background: #12122a;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 1rem 1.5rem;
            flex: 1;
            min-width: 120px;
            text-align: center;
        }
        .stat-box .num {
            font-size: 2rem;
            font-weight: 700;
            color: #7b8cde;
        }
        .stat-box .label {
            font-size: 0.78rem;
            color: #888;
            margin-top: 0.2rem;
        }

        /* ── Table ──────────────────────────────────────── */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }
        th {
            text-align: left;
            padding: 0.6rem 0.8rem;
            color: #7b8cde;
            border-bottom: 1px solid #2a2a4a;
            font-size: 0.78rem;
            text-transform: uppercase;
        }
        td {
            padding: 0.6rem 0.8rem;
            border-bottom: 1px solid #1a1a2e;
            color: #ccc;
        }
        tr:hover td { background: #1f1f3a; }

        /* ── Forms ──────────────────────────────────────── */
        h1 { color: #7b8cde; margin-bottom: 0.25rem; font-size: 1.6rem; }
        h2 { color: #7b8cde; margin-bottom: 1rem; font-size: 1.2rem; }
        .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; }

        .form-group { margin-bottom: 1rem; }
        label {
            display: block;
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        input, select {
            width: 100%;
            padding: 0.6rem 0.8rem;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }
        input:focus, select:focus { border-color: #7b8cde; }

        .btn {
            padding: 0.6rem 1.2rem;
            background: #7b8cde;
            color: #0f0f1a;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #9aaaf0; }
        .btn-full { width: 100%; margin-top: 0.5rem; }
        .btn-sm {
            padding: 0.3rem 0.7rem;
            font-size: 0.78rem;
        }
        .btn-danger {
            background: #3a1a1a;
            color: #f08080;
            border: 1px solid #5a2a2a;
        }
        .btn-success {
            background: #1a3a1a;
            color: #80f080;
            border: 1px solid #2a5a2a;
        }

        /* ── Messages ───────────────────────────────────── */
        .messages { list-style: none; margin-bottom: 1rem; }
        .messages li {
            padding: 0.6rem 0.8rem;
            border-radius: 6px;
            font-size: 0.88rem;
            margin-bottom: 0.4rem;
        }
        .messages .error   { background:#3a1a1a; color:#f08080; border:1px solid #5a2a2a; }
        .messages .success { background:#1a3a1a; color:#80f080; border:1px solid #2a5a2a; }

        /* ── Badge ──────────────────────────────────────── */
        .badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 700;
        }
        .badge-student { background:#1a2a3a; color:#80c0f0; }
        .badge-teacher { background:#2a1a3a; color:#c080f0; }
        .badge-parent  { background:#1a3a2a; color:#80f0b0; }
        .badge-admin   { background:#3a2a1a; color:#f0c080; }

        /* ── Profile info grid ──────────────────────────── */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }
        .info-item label {
            font-size: 0.72rem;
            color: #666;
            text-transform: uppercase;
        }
        .info-item p {
            color: #ddd;
            font-size: 0.9rem;
            margin-top: 0.1rem;
        }

        .footer-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #888;
        }
        .footer-link a { color: #7b8cde; text-decoration: none; }
    </style>
</head>
<body>

    <!-- ── Nav bar (only shown when logged in) ────────── -->
    {% if request.session.user_id %}
    <nav class="navbar">
        <a class="brand" href="#">🔐 Crypto School</a>
        <div class="nav-links">
            <span style="color:#666; font-size:0.85rem;">
                {{ request.session.username }}
                <span class="badge badge-{{ request.session.user_role }}">
                    {{ request.session.user_role }}
                </span>
            </span>
            <a href="{% url 'post_list' %}">📝 Posts</a>
            <a href="{% url 'security_dashboard' %}">🛡 Security</a>
            <a href="{% url 'session_dashboard' %}">🔒 Sessions</a>
            <a href="{% url 'update_profile' %}">Profile</a>
            <a href="{% url 'logout' %}" class="btn-logout">Logout</a>
        </div>
    </nav>
    {% endif %}

    {% block content %}{% endblock %}

</body>
</html>
